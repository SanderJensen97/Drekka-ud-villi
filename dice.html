<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice – Drekka ud Villi</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .dice-header {
      position: relative;
      text-align: center;
      margin-bottom: 2rem;
    }

    .dice-page-title {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: var(--gold);
    }

    .dice-sum {
      position: absolute;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: var(--gold);
    }

    .dice-area {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      min-height: 160px;
      margin-bottom: 2rem;
    }

    .die {
      width: 120px;
      height: 120px;
      background: var(--text-light);
      border-radius: 16px;
      border: 3px solid var(--gold);
      box-shadow: 0 0 20px rgba(201,168,76,0.3), 4px 4px 0 #000;
      cursor: pointer;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 14px;
      gap: 5px;
      user-select: none;
      transition: box-shadow 0.2s, transform 0.1s;
    }

    .die:hover {
      box-shadow: 0 0 32px rgba(201,168,76,0.55), 4px 4px 0 #000;
      transform: translateY(-3px);
    }

    .die:active {
      transform: scale(0.95);
    }

    .die.rolling {
      animation: diceRoll 0.975s ease-out;
      cursor: not-allowed;
      pointer-events: none;
    }

    @keyframes diceRoll {
      0%   { transform: rotate(0deg)   scale(1);    }
      15%  { transform: rotate(-22deg) scale(1.12); }
      32%  { transform: rotate(28deg)  scale(0.94); }
      50%  { transform: rotate(-14deg) scale(1.06); }
      67%  { transform: rotate(8deg)   scale(0.98); }
      82%  { transform: rotate(-4deg)  scale(1.02); }
      92%  { transform: rotate(2deg)   scale(1);    }
      100% { transform: rotate(0deg)   scale(1);    }
    }

    .dot {
      background: #1a1a1a;
      border-radius: 50%;
      width: 100%;
      height: 100%;
    }

    .dot.hidden {
      visibility: hidden;
    }

    .roll-all-btn {
      display: block;
      margin: 0 auto 1.5rem;
      padding: 0.75rem 2.5rem;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 5px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .roll-all-btn:hover { background: var(--accent); }
    .roll-all-btn:active { transform: scale(0.97); }
    .roll-all-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

    .dice-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
    }

    .dice-control-btn {
      width: 40px;
      height: 40px;
      background: transparent;
      border: 2px solid var(--gold);
      border-radius: 6px;
      color: var(--gold);
      font-size: 1.5rem;
      font-family: 'Oswald', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.2s, color 0.2s;
    }

    .dice-control-btn:hover:not(:disabled) {
      background: var(--gold);
      color: #000;
    }

    .dice-control-btn:disabled {
      border-color: #444;
      color: #444;
      cursor: not-allowed;
    }

    .dice-count {
      font-family: 'Oswald', sans-serif;
      font-size: 1.4rem;
      color: var(--text-light);
      min-width: 2rem;
      text-align: center;
    }

    .dice-hint {
      text-align: center;
      color: #666;
      font-size: 0.85rem;
      margin-top: 1rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="index.html" class="logo-title">Drekka ud Villi</a>
  <div class="logo-subtitle">Amsterdam &nbsp;·&nbsp; April 2026</div>
</header>

<nav>
  <a href="info.html">Info</a>
  <a href="timeline.html">Program</a>
  <a href="pakkeliste.html">Pakkeliste</a>
  <a href="faq.html">FAQ</a>
  <a href="wheel.html">Spinn</a>
  <a href="dice.html" class="active">Dice</a>
  <a href="bingo.html">Bingo</a>
</nav>

<main>
  <div class="dice-header">
    <span class="dice-page-title">Dice</span>
    <span class="dice-sum" id="diceSum"></span>
  </div>

  <div class="dice-area" id="diceArea"></div>

  <button class="roll-all-btn" id="rollAllBtn" onclick="rollAll()">KAST!</button>

  <div class="dice-control">
    <button class="dice-control-btn" id="minusBtn" onclick="changeDiceCount(-1)">−</button>
    <span class="dice-count" id="diceCountLabel">1</span>
    <button class="dice-control-btn" id="plusBtn" onclick="changeDiceCount(1)">+</button>
  </div>

  <div class="dice-hint">Klikk på ein terning eller trykk KAST!</div>
</main>

<footer>Drekka ud Villi · Amsterdam 2026</footer>

<script>
// Dot grid indices (3x3):
// 0 1 2
// 3 4 5
// 6 7 8
const FACE_DOTS = {
  1: [4],
  2: [2, 6],
  3: [2, 4, 6],
  4: [0, 2, 6, 8],
  5: [0, 2, 4, 6, 8],
  6: [0, 2, 3, 5, 6, 8]
};

let diceCount = 1;
let rolling = false;
let diceValues = [1];

function updateSum() {
  const sum = diceValues.slice(0, diceCount).reduce((a, b) => a + b, 0);
  document.getElementById('diceSum').textContent = sum;
}

function createDie(id) {
  const die = document.createElement('div');
  die.className = 'die';
  die.id = 'die-' + id;
  die.onclick = () => rollDie(id);
  for (let i = 0; i < 9; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot hidden';
    dot.dataset.cell = i;
    die.appendChild(dot);
  }
  return die;
}

function setDieFace(id, value) {
  const die = document.getElementById('die-' + id);
  if (!die) return;
  const activeCells = FACE_DOTS[value];
  die.querySelectorAll('.dot').forEach((dot, i) => {
    dot.classList.toggle('hidden', !activeCells.includes(i));
  });
  diceValues[id] = value;
  updateSum();
}

function rollDie(id) {
  if (rolling) return;
  rolling = true;
  document.getElementById('rollAllBtn').disabled = true;

  const die = document.getElementById('die-' + id);
  die.classList.add('rolling');

  let ticks = 0;
  const interval = setInterval(() => {
    setDieFace(id, Math.ceil(Math.random() * 6));
    if (++ticks >= 12) clearInterval(interval);
  }, 70);

  setTimeout(() => {
    die.classList.remove('rolling');
    setDieFace(id, Math.ceil(Math.random() * 6));
    rolling = false;
    document.getElementById('rollAllBtn').disabled = false;
  }, 975);
}

function rollAll() {
  if (rolling) return;
  rolling = true;
  document.getElementById('rollAllBtn').disabled = true;

  const ids = Array.from({ length: diceCount }, (_, i) => i);
  ids.forEach(id => document.getElementById('die-' + id).classList.add('rolling'));

  let ticks = 0;
  const interval = setInterval(() => {
    ids.forEach(id => setDieFace(id, Math.ceil(Math.random() * 6)));
    if (++ticks >= 12) clearInterval(interval);
  }, 70);

  setTimeout(() => {
    ids.forEach(id => {
      document.getElementById('die-' + id).classList.remove('rolling');
      setDieFace(id, Math.ceil(Math.random() * 6));
    });
    rolling = false;
    document.getElementById('rollAllBtn').disabled = false;
  }, 975);
}

function changeDiceCount(delta) {
  const next = diceCount + delta;
  if (next < 1 || next > 4) return;
  diceCount = next;
  renderDice();
  updateControls();
}

function renderDice() {
  diceValues = new Array(diceCount).fill(1);
  const area = document.getElementById('diceArea');
  area.innerHTML = '';
  for (let i = 0; i < diceCount; i++) {
    const die = createDie(i);
    area.appendChild(die);
    setDieFace(i, Math.ceil(Math.random() * 6));
  }
}

function updateControls() {
  document.getElementById('diceCountLabel').textContent = diceCount;
  document.getElementById('minusBtn').disabled = diceCount <= 1;
  document.getElementById('plusBtn').disabled = diceCount >= 4;
}

renderDice();
updateControls();
</script>

<script src="auth.js"></script>
<script>requireGlobalAuth();</script>

</body>
</html>
